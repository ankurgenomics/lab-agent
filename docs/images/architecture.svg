<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="900" height="600" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#e6edf3">Lab Agent  M1M4 Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#8b949e">Agentic closed-loop: LLM orchestrates instruments via natural language</text>

  <!-- Layer: User -->
  <rect x="360" y="75" width="180" height="46" rx="8" fill="#161b22" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#79c0ff">Natural Language Goal</text>
  <text x="450" y="112" text-anchor="middle" font-size="10" fill="#8b949e">User input or --loop N</text>

  <!-- Arrow down -->
  <line x1="450" y1="121" x2="450" y2="147" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer: LLM Orchestrator -->
  <rect x="310" y="148" width="280" height="46" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#56d364">LLM Orchestrator</text>
  <text x="450" y="185" text-anchor="middle" font-size="10" fill="#8b949e">Groq / Anthropic / Ollama  10 tools</text>

  <!-- Arrow down -->
  <line x1="450" y1="194" x2="450" y2="218" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- M2 Validator -->
  <rect x="325" y="219" width="250" height="40" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="450" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#e3b341">M2 Protocol Validator</text>
  <text x="450" y="252" text-anchor="middle" font-size="9.5" fill="#8b949e">channels À volumes À wells À limits</text>

  <!-- Four tool branches -->
  <!-- Acquire -->
  <line x1="380" y1="259" x2="170" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="70" y="320" width="200" height="50" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="170" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#79c0ff">M1 acquire_images()</text>
  <text x="170" y="356" text-anchor="middle" font-size="9.5" fill="#8b949e">Æ job_id (async)</text>

  <!-- Analyze -->
  <line x1="420" y1="259" x2="310" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="220" y="320" width="180" height="50" rx="8" fill="#0d1117" stroke="#8957e5" stroke-width="1.5"/>
  <text x="310" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#d2a8ff">analyze_images()</text>
  <text x="310" y="356" text-anchor="middle" font-size="9.5" fill="#8b949e">watershed / cellpose</text>

  <!-- Plan -->
  <line x1="480" y1="259" x2="590" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="500" y="320" width="180" height="50" rx="8" fill="#0d1117" stroke="#e3b341" stroke-width="1.5"/>
  <text x="590" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#e3b341">M4 plan_experiment()</text>
  <text x="590" y="356" text-anchor="middle" font-size="9.5" fill="#8b949e">JSON protocol À 3Î retry</text>

  <!-- Cytometry -->
  <line x1="520" y1="259" x2="750" y2="320" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="680" y="320" width="170" height="50" rx="8" fill="#0d1117" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="765" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#79c0ff">run_flow_cytometry()</text>
  <text x="765" y="356" text-anchor="middle" font-size="9.5" fill="#8b949e">10k events</text>

  <!-- M1 async thread -->
  <line x1="170" y1="370" x2="170" y2="410" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <rect x="80" y="410" width="180" height="40" rx="8" fill="#0d1117" stroke="#388bfd" stroke-width="1.5"/>
  <text x="170" y="431" text-anchor="middle" font-size="10" font-weight="600" fill="#79c0ff">Background Thread</text>
  <text x="170" y="444" text-anchor="middle" font-size="9" fill="#8b949e">wait_for_job() polls</text>

  <!-- analyze Æ LIMS -->
  <line x1="310" y1="370" x2="440" y2="425" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- cytometry Æ LIMS -->
  <line x1="720" y1="370" x2="530" y2="425" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- bg_thread Æ analyze (job done) -->
  <line x1="260" y1="430" x2="295" y2="370" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- M3 LIMS -->
  <rect x="350" y="425" width="200" height="50" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="447" text-anchor="middle" font-size="12" font-weight="700" fill="#56d364">M3 Local LIMS</text>
  <text x="450" y="462" text-anchor="middle" font-size="9.5" fill="#8b949e">70 rows À 5 metrics À SQLite</text>

  <!-- LIMS Æ LLM (feedback) -->
  <path d="M550,450 Q640,450 650,300 Q650,185 590,185" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="662" y="320" font-size="9" fill="#388bfd">query_lims()</text>
  <text x="662" y="332" font-size="9" fill="#388bfd">feedback</text>

  <!-- Plan Æ Approval gate -->
  <line x1="590" y1="370" x2="590" y2="415" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <rect x="500" y="415" width="180" height="38" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="590" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#e3b341">Human Approval Gate</text>
  <text x="590" y="447" text-anchor="middle" font-size="9" fill="#8b949e">--approve or --loop auto</text>

  <!-- Approval Æ Executor -->
  <line x1="590" y1="453" x2="590" y2="488" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-yellow)"/>
  <rect x="500" y="488" width="180" height="40" rx="8" fill="#0d1117" stroke="#e3b341" stroke-width="1.5"/>
  <text x="590" y="508" text-anchor="middle" font-size="10" font-weight="600" fill="#e3b341">Protocol Executor</text>
  <text x="590" y="522" text-anchor="middle" font-size="9" fill="#8b949e">deterministic step runner</text>

  <!-- Executor Æ LIMS (after run) -->
  <line x1="500" y1="510" x2="550" y2="475" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- LLM Æ Final report -->
  <line x1="310" y1="171" x2="160" y2="530" stroke="#555" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <rect x="60" y="530" width="200" height="40" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="160" y="550" text-anchor="middle" font-size="11" font-weight="600" fill="#56d364">Final Report</text>
  <text x="160" y="564" text-anchor="middle" font-size="9.5" fill="#8b949e">LLM interprets LIMS data</text>

  <!-- --loop next cycle -->
  <path d="M160,530 Q160,590 450,590 Q700,590 700,171" fill="none" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <text x="450" y="585" text-anchor="middle" font-size="9.5" fill="#388bfd">--loop: prior LIMS context Æ next cycle</text>

  <!-- Markers -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#388bfd"/>
    </marker>
    <marker id="arr-yellow" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#e3b341"/>
    </marker>
  </defs>
</svg>
